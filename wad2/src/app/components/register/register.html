<div class="auth-shell d-flex align-items-center py-4">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-9">
        <div class="card auth-card shadow-lg border-0">
          <div class="card-body p-4 p-md-5">
            <h1 class="h3 mb-4 text-center">User Authentication System</h1>

            <form [formGroup]="registerForm" (ngSubmit)="onRegister()" novalidate>
              <div class="row g-3">
                <div class="col-12 col-md-6">
                  <label class="form-label" for="fullName">Full Name</label>
                  <input id="fullName" class="form-control" type="text" formControlName="fullName" />
                  <small class="text-danger" *ngIf="f.fullName.touched && f.fullName.invalid">Full Name is required.</small>
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label" for="email">Email</label>
                  <input id="email" class="form-control" type="email" formControlName="email" />
                  <small class="text-danger" *ngIf="f.email.touched && f.email.invalid">Enter a valid email.</small>
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label" for="password">Password</label>
                  <input id="password" class="form-control" type="password" formControlName="password" />
                  <small class="text-danger" *ngIf="f.password.touched && f.password.invalid">Minimum 6 characters.</small>
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label" for="confirmPassword">Confirm Password</label>
                  <input id="confirmPassword" class="form-control" type="password" formControlName="confirmPassword" />
                  <small class="text-danger" *ngIf="registerForm.touched && registerForm.errors?.['passwordMismatch']">
                    Password and Confirm Password must match.
                  </small>
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label" for="phoneNumber">Phone Number</label>
                  <input id="phoneNumber" class="form-control" type="tel" formControlName="phoneNumber" />
                  <small class="text-danger" *ngIf="f.phoneNumber.touched && f.phoneNumber.invalid">Enter a valid phone number.</small>
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label" for="dateOfBirth">Date of Birth</label>
                  <input id="dateOfBirth" class="form-control" type="date" formControlName="dateOfBirth" />
                </div>

                <div class="col-12">
                  <label class="form-label" for="address">Address</label>
                  <input id="address" class="form-control" type="text" formControlName="address" />
                </div>

                <div class="col-12 col-md-4">
                  <label class="form-label" for="city">City</label>
                  <input id="city" class="form-control" type="text" formControlName="city" />
                </div>

                <div class="col-12 col-md-4">
                  <label class="form-label" for="country">Country</label>
                  <input id="country" class="form-control" type="text" formControlName="country" />
                </div>

                <div class="col-12 col-md-4">
                  <label class="form-label" for="userType">User Type</label>
                  <select id="userType" class="form-select" formControlName="userType">
                    <option *ngFor="let t of userTypes" [value]="t">{{ t }}</option>
                  </select>
                </div>
              </div>

              <div *ngIf="message" class="alert mt-3" [ngClass]="isError ? 'alert-danger' : 'alert-success'">
                {{ message }}
              </div>

              <div class="d-flex gap-2 mt-3">
                <button class="btn btn-primary" type="submit" [disabled]="isSubmitting">Register</button>
                <button class="btn btn-outline-secondary" type="button" (click)="onClear()">Clear</button>
              </div>
            </form>

            <p class="text-center mt-4 mb-0">
              Already have an account?
              <a routerLink="/login" class="fw-semibold text-decoration-none">Login here</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
