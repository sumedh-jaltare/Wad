<div class="container-fluid py-4" style="background: #f5f7fb; min-height: 100vh;">
  <nav class="navbar navbar-expand-lg bg-white shadow-sm mb-4 rounded">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h5">College Admin Portal</span>
      <div class="d-flex gap-2">
        <a routerLink="/profile" class="btn btn-info btn-sm" *ngIf="currentUser">
          {{ currentUser.fullName }}
        </a>
        <button class="btn btn-danger btn-sm" (click)="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="row g-3 mb-4">
      <div class="col-12 col-md-3">
        <div class="card border-0 shadow-sm" style="border-left: 4px solid #667eea;">
          <div class="card-body">
            <p class="text-muted small mb-1">Total Students</p>
            <h3 class="mb-0">1,250</h3>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-3">
        <div class="card border-0 shadow-sm" style="border-left: 4px solid #764ba2;">
          <div class="card-body">
            <p class="text-muted small mb-1">Total Courses</p>
            <h3 class="mb-0">12</h3>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-3">
        <div class="card border-0 shadow-sm" style="border-left: 4px solid #f093fb;">
          <div class="card-body">
            <p class="text-muted small mb-1">Faculty Members</p>
            <h3 class="mb-0">48</h3>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-3">
        <div class="card border-0 shadow-sm" style="border-left: 4px solid #4facfe;">
          <div class="card-body">
            <p class="text-muted small mb-1">Placements</p>
            <h3 class="mb-0">85%</h3>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-12 col-md-6">
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-light">
            <h5 class="card-title mb-0">Welcome</h5>
          </div>
          <div class="card-body">
            <p class="mb-0">
              Hello <strong>{{ currentUser?.fullName }}</strong>! Welcome to the College Admin Portal.
            </p>
            <p class="text-muted small mt-3 mb-0">
              Logged in as: <strong>{{ currentUser?.email }}</strong>
            </p>
          </div>
        </div>
      </div>

      <div class="col-12 col-md-6">
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-light">
            <h5 class="card-title mb-0">Quick Actions</h5>
          </div>
          <div class="card-body">
            <div class="d-grid gap-2">
              <a routerLink="/profile" class="btn btn-primary">View Profile</a>
              <button class="btn btn-outline-danger" (click)="logout()">Logout</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
