<div class="auth-shell min-vh-100 d-flex align-items-center">
  <div class="container">
    <div class="row g-0 overflow-hidden rounded-4 shadow-lg bg-white">
      <div class="col-12 col-lg-7 p-4 p-md-5">
        <h1 class="h3 mb-2">User Authentication System</h1>
        <p class="text-muted mb-4">Login to continue</p>

        <form [formGroup]="loginForm" (ngSubmit)="onLogin()" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input id="email" type="email" class="form-control" formControlName="email" />
            <small class="text-danger" *ngIf="f.email.touched && f.email.invalid">Enter a valid email.</small>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input id="password" type="password" class="form-control" formControlName="password" />
            <small class="text-danger" *ngIf="f.password.touched && f.password.invalid">Password is required (min 6 chars).</small>
          </div>

          <div class="form-check mb-3">
            <input id="rememberMe" class="form-check-input" type="checkbox" formControlName="rememberMe" />
            <label for="rememberMe" class="form-check-label">Remember Me</label>
          </div>

          <div *ngIf="message" class="alert" [ngClass]="isError ? 'alert-danger' : 'alert-success'">
            {{ message }}
          </div>

          <div class="d-flex gap-2">
            <button class="btn btn-primary" type="submit" [disabled]="isSubmitting">Login</button>
            <button class="btn btn-outline-primary" type="button" (click)="onDemoLogin()">Demo Login</button>
          </div>
        </form>
      </div>

      <div class="col-12 col-lg-5 side-panel text-white d-flex flex-column justify-content-center p-4 p-md-5">
        <h2 class="h4">New User?</h2>
        <p class="mb-4 opacity-75">Create an account to access your personalized profile dashboard.</p>
        <a routerLink="/register" class="btn btn-light text-primary fw-semibold">Create Account</a>
      </div>
    </div>
  </div>
</div>
