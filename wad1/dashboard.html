<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasMenu" aria-labelledby="offcanvasMenuLabel">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title" id="offcanvasMenuLabel">Menu</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body">
      <ul class="nav nav-pills flex-column gap-2">
        <li class="nav-item"><a class="nav-link active" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="register.html">Registration Form</a></li>
        <li class="nav-item"><a class="nav-link text-danger" href="index.html">Logout</a></li>
      </ul>
    </div>
  </div>

  <nav class="navbar navbar-expand-lg bg-light border-bottom">
    <div class="container-fluid">
      <button class="btn btn-outline-primary" data-bs-toggle="offcanvas" data-bs-target="#offcanvasMenu"
        aria-controls="offcanvasMenu" aria-label="Open menu">
        <i class="bi bi-list fs-4"></i>
      </button>
      <span class="navbar-brand ms-2 mb-0 h1">College Dashboard</span>
      <a href="register.html" class="btn btn-primary ms-auto">Add Registration</a>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-3">
      <div class="col-12 col-sm-6 col-xl-3">
        <article class="stats-card text-bg-primary">
          <p class="mb-1">Total Registrations</p>
          <h2 id="totalRegistrations" class="mb-0">0</h2>
        </article>
      </div>
      <div class="col-12 col-sm-6 col-xl-3">
        <article class="stats-card text-bg-success">
          <p class="mb-1">Courses</p>
          <h2 class="mb-0">8</h2>
        </article>
      </div>
      <div class="col-12 col-sm-6 col-xl-3">
        <article class="stats-card text-bg-warning">
          <p class="mb-1">Faculty</p>
          <h2 class="mb-0">42</h2>
        </article>
      </div>
      <div class="col-12 col-sm-6 col-xl-3">
        <article class="stats-card text-bg-danger">
          <p class="mb-1">Exams This Month</p>
          <h2 class="mb-0">12</h2>
        </article>
      </div>
    </div>

    <section class="card shadow-sm mt-4">
      <div class="card-header bg-white d-flex justify-content-between align-items-center">
        <h2 class="h5 mb-0">Recent Registrations</h2>
        <button id="clearRegistrations" class="btn btn-sm btn-outline-danger" type="button">Clear All</button>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-striped mb-0 align-middle">
            <thead class="table-dark">
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Course</th>
                <th>Year</th>
                <th>Saved At</th>
              </tr>
            </thead>
            <tbody id="registrationTableBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="Script.js"></script>
</body>

</html>
