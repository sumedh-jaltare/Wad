<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">
    <main class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h3 mb-0">Student Registration</h1>
            <a class="btn btn-outline-secondary" href="dashboard.html">Back to Dashboard</a>
        </div>

        <section class="card shadow-sm">
            <div class="card-body p-4">
                <form id="registrationForm" class="row g-3" novalidate>
                    <div class="col-12 col-md-6">
                        <label class="form-label" for="fullName">Full Name</label>
                        <input class="form-control" id="fullName" type="text" required>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label" for="email">Email</label>
                        <input class="form-control" id="email" type="email" required>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label" for="phone">Phone</label>
                        <input class="form-control" id="phone" type="tel" minlength="10" required>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label" for="course">Course</label>
                        <select class="form-select" id="course" required>
                            <option value="">Choose...</option>
                            <option>IT Engineering</option>
                            <option>CS Engineering</option>
                            <option>Mechanical Engineering</option>
                            <option>Civil Engineering</option>
                            <option>Electrical Engineering</option>
                            <option>Electronics Engineering</option>

                        </select>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label" for="year">Year</label>
                        <select class="form-select" id="year" required>
                            <option value="">Choose...</option>
                            <option>1st Year</option>
                            <option>2nd Year</option>
                            <option>3rd Year</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">Submit Registration</button>
                        <a href="dashboard.html" class="btn btn-outline-primary ms-2">View on Dashboard</a>
                    </div>
                </form>

                <p id="registrationMessage" class="small mt-3 mb-0"></p>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="Script.js"></script>
</body>

</html>
