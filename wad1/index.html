<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Signup</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-bg">
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-9 col-lg-6">
        <section class="card shadow auth-card">
          <div class="card-body p-4 p-md-5">
            <h1 class="h3 mb-4 text-center">College Admin Portal</h1>

            <div class="d-flex gap-2 mb-4">
              <button id="showLogin" class="btn btn-primary flex-fill" type="button">Login</button>
              <button id="showSignup" class="btn btn-outline-primary flex-fill" type="button">Signup</button>
            </div>

            <form id="loginForm" class="vstack gap-3" novalidate>
              <div>
                <label for="loginEmail" class="form-label">Email</label>
                <input id="loginEmail" class="form-control" type="email" required>
              </div>
              <div>
                <label for="loginPassword" class="form-label">Password</label>
                <input id="loginPassword" class="form-control" type="password" minlength="6" required>
              </div>
              <button class="btn btn-primary" type="submit">Login</button>
            </form>

            <form id="signupForm" class="vstack gap-3 d-none" novalidate>
              <div>
                <label for="signupName" class="form-label">Full Name</label>
                <input id="signupName" class="form-control" type="text" required>
              </div>
              <div>
                <label for="signupEmail" class="form-label">Email</label>
                <input id="signupEmail" class="form-control" type="email" required>
              </div>
              <div>
                <label for="signupPassword" class="form-label">Password</label>
                <input id="signupPassword" class="form-control" type="password" minlength="6" required>
              </div>
              <button class="btn btn-primary" type="submit">Create Account</button>
            </form>

            <p id="authMessage" class="small mt-3 mb-0"></p>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="Script.js"></script>
</body>

</html>
